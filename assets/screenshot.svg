<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" font-family="system-ui,Segoe UI,Helvetica,sans-serif">
  <rect width="800" height="420" fill="#0d1117"/>
  <text x="28" y="40" font-size="19" font-weight="800" fill="#e6edf3">blast-radius</text>
  <text x="180" y="40" font-size="13" fill="#7d8590">what does changing this file actually affect?</text>
  <!-- graph -->
  <g font-size="12" font-family="SFMono-Regular,monospace">
    <!-- edges -->
    <line x1="170" y1="200" x2="320" y2="120" stroke="#f85149" stroke-width="2"/>
    <line x1="320" y1="120" x2="470" y2="120" stroke="#f85149" stroke-width="2"/>
    <line x1="470" y1="120" x2="620" y2="160" stroke="#f85149" stroke-width="2"/>
    <line x1="170" y1="200" x2="320" y2="280" stroke="#30363d" stroke-width="2"/>
    <line x1="620" y1="160" x2="620" y2="160" stroke="#30363d"/>
    <!-- changed node -->
    <g><rect x="60" y="180" width="120" height="40" rx="8" fill="#f85149"/><text x="120" y="205" fill="#fff" text-anchor="middle">utils/format.ts</text></g>
    <text x="120" y="245" fill="#f85149" text-anchor="middle" font-family="system-ui">CHANGED</text>
    <!-- affected -->
    <g><rect x="248" y="100" width="120" height="40" rx="8" fill="#3d1d1d" stroke="#f85149"/><text x="308" y="125" fill="#ffb4b0" text-anchor="middle">models/user.ts</text></g>
    <g><rect x="398" y="100" width="120" height="40" rx="8" fill="#3d1d1d" stroke="#f85149"/><text x="458" y="125" fill="#ffb4b0" text-anchor="middle">api/users.ts</text></g>
    <g><rect x="560" y="140" width="120" height="40" rx="8" fill="#3d1d1d" stroke="#f85149"/><text x="620" y="165" fill="#ffb4b0" text-anchor="middle">api/index.ts</text></g>
    <g><rect x="248" y="260" width="120" height="40" rx="8" fill="#161b22" stroke="#30363d"/><text x="308" y="285" fill="#7d8590" text-anchor="middle">other/unrelated.ts</text></g>
  </g>
  <!-- panel -->
  <rect x="28" y="320" width="744" height="80" rx="8" fill="#161b22" stroke="#30363d"/>
  <text font-size="12.5" font-family="SFMono-Regular,monospace" xml:space="preserve">
    <tspan x="44" y="346" fill="#3fb950">$ blastRadius(graph, ["src/utils/format.ts"])</tspan>
    <tspan x="44" y="366" fill="#ffb4b0">→ models/user.ts · api/users.ts · api/index.ts · app.ts   </tspan><tspan fill="#7d8590">(4 files, transitively)</tspan>
    <tspan x="44" y="388" fill="#7d8590">also: roots() finds dead code · findCycle() flags circular imports · JSON / DOT output · ✓ 8 tests</tspan>
  </text>
</svg>
